name: windows-smoke

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-full:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install pi
        run: npm install -g @mariozechner/pi-coding-agent

      - name: Install npm dependencies
        run: npm ci

      - name: Run full test suite
        run: npm test

      - name: Smoke-test packed CLI artifact
        run: node scripts/packed-cli-smoke.mjs

      - name: Run lazypi --yes
        run: node bin/lazypi.mjs --yes

      - name: Assert expected packages for full install
        run: node scripts/assert-installed-packages.mjs --check-status

      - name: Doctor passes on Windows
        run: node bin/lazypi.mjs doctor

  windows-except-compound:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pi
        run: npm install -g @mariozechner/pi-coding-agent

      - name: Install npm dependencies
        run: npm ci

      - name: Run tests without compound integration
        run: npm test
        env:
          LAZYPI_SKIP_COMPOUND_INTEGRATION: "1"

      - name: Smoke-test packed CLI artifact
        run: node scripts/packed-cli-smoke.mjs

      - name: Run lazypi --yes --except compound
        run: node bin/lazypi.mjs --yes --except compound

      - name: Assert expected packages for all except compound
        run: node scripts/assert-installed-packages.mjs --except=compound --check-status

      - name: Doctor passes on Windows without bun
        run: node bin/lazypi.mjs doctor
