name: release-please

on:
  workflow_dispatch:
    inputs:
      release_as:
        description: Optional explicit version override for this run (for example 0.1.3)
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: node
          release-as: ${{ inputs.release_as }}
